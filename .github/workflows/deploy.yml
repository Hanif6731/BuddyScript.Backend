name: Deploy Backend

on:
  push:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: node-primary
    environment: BS-API-Prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Write environment secrets to .env
        shell: pwsh
        run: |
          $lines = @(
            "ConnectionStrings__DefaultConnection=${{ secrets.PROD_DB_CONNECTION }}",
            "Jwt__Key=${{ secrets.PROD_JWT_SECRET }}",
            "Jwt__CookieName=${{ secrets.PROD_JWT_COOKIE_NAME }}",
            "Jwt__Issuer=${{ secrets.PROD_JWT_ISSUER }}",
            "Jwt__Audience=${{ secrets.PROD_JWT_AUDIENCE }}",
            "Google__ClientId=${{ secrets.PROD_GOOGLE_CLIENT_ID }}",
            "Google__ClientSecret=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}",
            "ASPNETCORE_ENVIRONMENT=Production"
          )
          $lines | Set-Content -Path .env -Encoding UTF8

      - name: Deploy with Docker Compose
        shell: pwsh
        run: |
          docker compose down
          docker compose up -d --build
          docker image prune -f

      - name: Clean up .env
        if: always()
        shell: pwsh
        run: Remove-Item -Path .env -Force -ErrorAction SilentlyContinue
