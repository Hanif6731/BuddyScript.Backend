services:
  buddyscript-api:
    container_name: buddyscript-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - buddynet
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  buddynet:
    external: true
